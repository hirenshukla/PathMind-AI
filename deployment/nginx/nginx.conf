# PathMind AI — Nginx Production Config
# /etc/nginx/nginx.conf or deployment/nginx/nginx.conf

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Logging
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # Performance
    sendfile        on;
    tcp_nopush      on;
    keepalive_timeout 65;
    gzip            on;
    gzip_types      text/plain text/css application/json application/javascript text/xml;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;
    limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/m;

    # ─── HTTP → HTTPS Redirect ──────────────────────────────────────────────
    server {
        listen 80;
        server_name pathmind.ai www.pathmind.ai api.pathmind.ai;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ─── Main App (Frontend) ────────────────────────────────────────────────
    server {
        listen 443 ssl http2;
        server_name pathmind.ai www.pathmind.ai;

        ssl_certificate     /etc/nginx/ssl/live/pathmind.ai/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/live/pathmind.ai/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-RSA-AES256-GCM-SHA384:ECDHE-RSA-AES128-GCM-SHA256;
        ssl_prefer_server_ciphers on;
        ssl_session_cache shared:SSL:10m;

        # Frontend (Next.js)
        location / {
            proxy_pass http://frontend:3000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
        }

        # Static assets — long cache
        location ~* \.(js|css|png|jpg|ico|woff2)$ {
            proxy_pass http://frontend:3000;
            expires 30d;
            add_header Cache-Control "public, immutable";
        }
    }

    # ─── API (FastAPI Backend) ───────────────────────────────────────────────
    server {
        listen 443 ssl http2;
        server_name api.pathmind.ai;

        ssl_certificate     /etc/nginx/ssl/live/pathmind.ai/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/live/pathmind.ai/privkey.pem;

        client_max_body_size 10M;  # For resume uploads

        # Rate limit API calls
        location /api/v1/ {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://backend:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
        }

        # Stricter rate limit on auth
        location /api/v1/auth/ {
            limit_req zone=auth burst=5 nodelay;
            proxy_pass http://backend:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Health check — no rate limit
        location /health {
            proxy_pass http://backend:8000;
        }

        # API docs — only in staging
        location /api/docs {
            proxy_pass http://backend:8000;
            # Uncomment to restrict to IP in production:
            # allow 10.0.0.0/8;
            # deny all;
        }
    }
}
